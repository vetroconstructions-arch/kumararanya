name: Automated Sitemap Indexing (SEO)

on:
  push:
    branches:
      - main
  schedule:
    # Run every 48 hours (00:00 every 2 days) as backup
    - cron: '0 0 */2 * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  ping-search-engines:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Google (All Sitemaps)
        run: |
          curl -s -o /dev/null -w "%{http_code}" "https://www.google.com/ping?sitemap=https://www.kumararanya.in/sitemap.xml"
          curl -s -o /dev/null -w "%{http_code}" "https://www.google.com/ping?sitemap=https://www.kumararanya.in/image-sitemap.xml"
          curl -s -o /dev/null -w "%{http_code}" "https://www.google.com/ping?sitemap=https://www.kumararanya.in/news-sitemap.xml"
          echo "Successfully pinged Google."

      - name: Ping Bing (All Sitemaps)
        run: |
          curl -s -o /dev/null -w "%{http_code}" "https://www.bing.com/ping?sitemap=https://www.kumararanya.in/sitemap.xml"
          curl -s -o /dev/null -w "%{http_code}" "https://www.bing.com/ping?sitemap=https://www.kumararanya.in/image-sitemap.xml"
          curl -s -o /dev/null -w "%{http_code}" "https://www.bing.com/ping?sitemap=https://www.kumararanya.in/news-sitemap.xml"
          echo "Successfully pinged Bing."

      - name: Ping IndexNow (Yahoo, DuckDuckGo, Seznam, Naver)
        run: |
          curl -s -o /dev/null -w "%{http_code}" "https://api.indexnow.org/indexnow?url=https://www.kumararanya.in/sitemap.xml&key=66258ed6b2364db2a7e781ef51dc6109"
          echo "Successfully pinged IndexNow network."
